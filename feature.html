<!DOCTYPE html>
<html lang="en">
<head>
  <title>Features - Tarot World</title>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

  <style>
    body{
      background: radial-gradient(circle, #240046, #10002b);
      color:white;
    }

    .glow{
      text-shadow:0 0 10px #c77dff;
    }

    .feature-box{
      background:rgba(255,255,255,0.05);
      padding:25px;
      border-radius:15px;
      transition:0.3s;
      height:100%;
    }

    .feature-box:hover{
      transform:translateY(-5px);
      box-shadow:0 0 20px #c77dff;
    }
  </style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a href="index.html" class="navbar-brand glow">🔮 Tarot World</a>
  </div>
</nav>

<div class="container py-5">

  <h1 class="text-center glow mb-5">
    ✨ Website Features
  </h1>

  <div class="row g-4">

    <div class="col-md-4">
      <div class="feature-box text-center">
        <h3>🔮 Tarot Reading</h3>
        <p>Interactive tarot prediction experience.</p>
      </div>
    </div>

    <div class="col-md-4">
      <div class="feature-box text-center">
        <h3>🃏 Card Gallery</h3>
        <p>Explore mystical tarot card collection.</p>
      </div>
    </div>

    <div class="col-md-4">
      <div class="feature-box text-center">
        <h3>✨ Animation</h3>
        <p>Beautiful glowing and star animations.</p>
      </div>
    </div>

  </div>

</div>

</body>
</html>
