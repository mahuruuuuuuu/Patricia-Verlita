<!DOCTYPE html>
<html lang="en">
<head>
  <title>Pricing</title>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

  <style>
    body{
      background: radial-gradient(circle, #240046, #10002b);
      color:white;
    }

    .price-card{
      background:rgba(255,255,255,0.05);
      padding:30px;
      border-radius:20px;
      transition:0.3s;
    }

    .price-card:hover{
      transform:scale(1.05);
      box-shadow:0 0 20px #c77dff;
    }

    .glow{
      text-shadow:0 0 10px #c77dff;
    }
  </style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a href="index.html" class="navbar-brand glow">🔮 Tarot World</a>
  </div>
</nav>

<div class="container py-5">

  <h1 class="text-center glow mb-5">💎 Pricing Plans</h1>

  <div class="row justify-content-center g-4">

    <div class="col-md-4">
      <div class="price-card text-center">
        <h2>Free</h2>
        <h3>$0</h3>
        <p>Basic tarot reading</p>
      </div>
    </div>

    <div class="col-md-4">
      <div class="price-card text-center">
        <h2>Premium</h2>
        <h3>$9</h3>
        <p>Advanced tarot insight and exclusive cards</p>
      </div>
    </div>

  </div>

</div>

</body>
</html>
