<!DOCTYPE html>
<html lang="en">
<head>
  <title>Tarot World</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #1a1a2e, #3a0ca3);
      color: white;
    }
    .hero {
      height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .card-img {
      width: 120px;
      transition: transform 0.3s;
    }
    .card-img:hover {
      transform: scale(1.1) rotate(3deg);
    }
  </style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <span class="navbar-brand">🔮 Tarot World</span>
  </div>
</nav>

<div class="hero container">
  <div>
    <h1 class="display-4">Discover Your Fate</h1>
    <p class="lead">Explore mystical tarot cards and their meanings</p>

    <div class="my-4">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/53/RWS_Tarot_00_Fool.jpg/200px-RWS_Tarot_00_Fool.jpg" class="card-img">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/de/RWS_Tarot_01_Magician.jpg/200px-RWS_Tarot_01_Magician.jpg" class="card-img">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/88/RWS_Tarot_02_High_Priestess.jpg/200px-RWS_Tarot_02_High_Priestess.jpg" class="card-img">
    </div>

    <a href="cards.html" class="btn btn-lg btn-light m-2">Explore Cards</a>
    <a href="profile.html" class="btn btn-lg btn-outline-light m-2">Try Reading</a>
  </div>
</div>

</body>
</html>
