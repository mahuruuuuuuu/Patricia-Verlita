<!DOCTYPE html>
<html lang="en">
<head>
  <title>Tarot World</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

  <style>
    body {
      margin:0;
      height:100vh;
      background: radial-gradient(circle at top, #3c096c, #10002b);
      color:white;
      overflow:hidden;
    }

    canvas {
      position:fixed;
      top:0;
      left:0;
      z-index:-1;
    }

    .glow {
      text-shadow: 0 0 15px #c77dff, 0 0 30px #9d4edd;
    }

    .btn-custom {
      border-radius:30px;
      padding:10px 25px;
      transition:0.3s;
    }

    .btn-custom:hover {
      transform:scale(1.1);
      box-shadow:0 0 15px #c77dff;
    }
  </style>
</head>

<body class="text-center">

<canvas id="stars"></canvas>

<div class="container d-flex flex-column justify-content-center align-items-center" style="height:100vh;">
  <h1 class="display-3 glow">🔮 Tarot World</h1>
  <p class="lead">Unveil your destiny through mystical cards</p>

  <div class="mt-4">
    <a href="cards.html" class="btn btn-light btn-custom m-2">Explore Cards</a>
    <a href="profile.html" class="btn btn-outline-light btn-custom m-2">Play Tarot</a>
  </div>
</div>

<script>
// ⭐ STAR ANIMATION
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];
for(let i=0;i<100;i++){
  stars.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    size: Math.random()*2
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "white";

  stars.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
    ctx.fill();

    s.y += 0.2;
    if(s.y > canvas.height) s.y = 0;
  });

  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
