<!DOCTYPE html>
<html>
<head>
  <title>Tarot Reading</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

  <style>
    body {
      background: radial-gradient(circle, #240046, #10002b);
      color:white;
      text-align:center;
    }

    .glow {
      text-shadow: 0 0 12px #c77dff;
    }

    .card-container {
      perspective:1000px;
      cursor:pointer;
    }

    .card-inner {
      width:150px;
      height:250px;
      transition: transform 0.8s;
      transform-style: preserve-3d;
      position:relative;
    }

    .card-inner:hover {
      box-shadow: 0 0 25px #c77dff;
    }

    .flipped {
      transform: rotateY(180deg);
    }

    .card-front, .card-back {
      position:absolute;
      width:100%;
      height:100%;
      backface-visibility:hidden;
      border-radius:10px;
    }

    .card-front {
      background:black;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:18px;
    }

    .card-back {
      transform: rotateY(180deg);
    }

    img {
      width:100%;
      height:100%;
      border-radius:10px;
      object-fit:cover;
    }

    .result-box {
      margin-top:30px;
      padding:20px;
      border-radius:15px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      box-shadow:0 0 20px #9d4edd;
      opacity:0;
      transition:0.5s;
    }

    .show {
      opacity:1;
    }
  </style>
</head>

<body>

<a href="index.html" class="btn btn-outline-light m-3">⬅ Back</a>

<h1 class="glow">🔮 Past • Present • Future</h1>
<p>Click all cards to reveal your destiny</p>

<div class="d-flex justify-content-center gap-4 mt-4">

  <!-- PAST -->
  <div class="card-container" onclick="flipCard(this,0)">
    <div class="card-inner">
      <div class="card-front">Past</div>
      <div class="card-back">
        <img id="img0" onerror="this.onerror=null; this.src='https://picsum.photos/200/300?random=11';">
      </div>
    </div>
  </div>

  <!-- PRESENT -->
  <div class="card-container" onclick="flipCard(this,1)">
    <div class="card-inner">
      <div class="card-front">Present</div>
      <div class="card-back">
        <img id="img1" onerror="this.onerror=null; this.src='https://picsum.photos/200/300?random=12';">
      </div>
    </div>
  </div>

  <!-- FUTURE -->
  <div class="card-container" onclick="flipCard(this,2)">
    <div class="card-inner">
      <div class="card-front">Future</div>
      <div class="card-back">
        <img id="img2" onerror="this.onerror=null; this.src='https://picsum.photos/200/300?random=13';">
      </div>
    </div>
  </div>

</div>

<div id="result" class="result-box"></div>

<script>
let flippedCount = 0;

const tarot = [
  {name:"The Fool", desc:"New beginning & adventure", img:"https://upload.wikimedia.org/wikipedia/en/d/d4/RWS_Tarot_00_Fool.jpg"},
  {name:"The Magician", desc:"Power & action", img:"https://upload.wikimedia.org/wikipedia/en/d/de/RWS_Tarot_01_Magician.jpg"},
  {name:"High Priestess", desc:"Intuition & mystery", img:"https://upload.wikimedia.org/wikipedia/en/8/88/RWS_Tarot_02_High_Priestess.jpg"},
  {name:"The Empress", desc:"Growth & nurturing", img:"https://upload.wikimedia.org/wikipedia/en/d/d2/RWS_Tarot_03_Empress.jpg"},
  {name:"The Emperor", desc:"Authority & structure", img:"https://upload.wikimedia.org/wikipedia/en/c/c3/RWS_Tarot_04_Emperor.jpg"},
  {name:"The Lovers", desc:"Love & harmony", img:"https://upload.wikimedia.org/wikipedia/en/3/3a/TheLovers.jpg"},
  {name:"The Sun", desc:"Success & positivity", img:"https://upload.wikimedia.org/wikipedia/en/1/17/RWS_Tarot_19_Sun.jpg"}
];

let results = ["","",""];

function flipCard(card,index){
  let inner = card.querySelector(".card-inner");

  if(inner.classList.contains("flipped")) return;

  inner.classList.add("flipped");

  let r = Math.floor(Math.random()*tarot.length);

  // biar ga dobel kartu
  while(results.includes(tarot[r].name)){
    r = Math.floor(Math.random()*tarot.length);
  }

  document.getElementById("img"+index).src = tarot[r].img;

  results[index] = tarot[r].name + " → " + tarot[r].desc;

  flippedCount++;

  if(flippedCount === 3){
    showResult();
  }
}

function showResult(){
  let text = `
  <h4 class="glow">Your Reading ✨</h4>
  <p><b>Past:</b> ${results[0]}</p>
  <p><b>Present:</b> ${results[1]}</p>
  <p><b>Future:</b> ${results[2]}</p>
  `;

  let resultBox = document.getElementById("result");
  resultBox.innerHTML = text;
  resultBox.classList.add("show");
}
</script>

</body>
</html>
