<!DOCTYPE html>
<html>
<head>
  <title>Tarot Reading</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #240046, #3c096c);
      color: white;
      text-align: center;
    }
    img {
      width: 200px;
      margin-top: 20px;
      transition: 0.5s;
    }
    img:hover {
      transform: scale(1.1);
    }
  </style>
</head>

<body>

<div class="container mt-5">
  <h1>🔮 Tarot Reading</h1>
  <p>Click the button to reveal your destiny</p>

  <button class="btn btn-light" onclick="drawCard()">Draw Card</button>

  <h3 id="title" class="mt-4"></h3>
  <p id="desc"></p>
  <img id="image">
</div>

<script>
const tarot = [
  {
    name: "The Fool",
    desc: "New beginnings and adventure",
    img: "https://upload.wikimedia.org/wikipedia/commons/5/53/RWS_Tarot_00_Fool.jpg"
  },
  {
    name: "The Magician",
    desc: "Power and skill",
    img: "https://upload.wikimedia.org/wikipedia/commons/d/de/RWS_Tarot_01_Magician.jpg"
  },
  {
    name: "High Priestess",
    desc: "Mystery and intuition",
    img: "https://upload.wikimedia.org/wikipedia/commons/8/88/RWS_Tarot_02_High_Priestess.jpg"
  }
];

function drawCard(){
  let r = Math.floor(Math.random() * tarot.length);

  document.getElementById("title").innerText = tarot[r].name;
  document.getElementById("desc").innerText = tarot[r].desc;
  document.getElementById("image").src = tarot[r].img;
}
</script>

</body>
</html>
