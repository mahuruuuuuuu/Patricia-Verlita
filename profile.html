<!DOCTYPE html>
<html>
<head>
  <title>Tarot Game</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

  <style>
    body {
      background: radial-gradient(circle, #240046, #10002b);
      color:white;
      text-align:center;
    }

    .card-container {
      perspective:1000px;
      cursor:pointer;
    }

    .card-inner {
      width:150px;
      height:250px;
      transition: transform 0.8s;
      transform-style: preserve-3d;
      position:relative;
    }

    .flipped {
      transform: rotateY(180deg);
    }

    .card-front, .card-back {
      position:absolute;
      width:100%;
      height:100%;
      backface-visibility:hidden;
      border-radius:10px;
    }

    .card-front {
      background:black;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:30px;
    }

    .card-back {
      transform: rotateY(180deg);
    }

    img {
      width:100%;
      height:100%;
      border-radius:10px;
    }

    #result {
      margin-top:20px;
      opacity:0;
      transition:0.5s;
    }

    .show {
      opacity:1 !important;
    }
  </style>
</head>

<body>

<a href="index.html" class="btn btn-outline-light m-3">⬅ Back</a>

<h1 class="glow">🔮 Pick Your Card</h1>

<div class="d-flex justify-content-center gap-4 mt-4">

  <div class="card-container" onclick="flipCard(this,0)">
    <div class="card-inner">
      <div class="card-front">?</div>
      <div class="card-back"><img id="img0"></div>
    </div>
  </div>

  <div class="card-container" onclick="flipCard(this,1)">
    <div class="card-inner">
      <div class="card-front">?</div>
      <div class="card-back"><img id="img1"></div>
    </div>
  </div>

  <div class="card-container" onclick="flipCard(this,2)">
    <div class="card-inner">
      <div class="card-front">?</div>
      <div class="card-back"><img id="img2"></div>
    </div>
  </div>

</div>

<h3 id="result"></h3>

<script>
let chosen = false;

const tarot = [
  {name:"The Fool", desc:"New beginning", img:"https://upload.wikimedia.org/wikipedia/commons/5/53/RWS_Tarot_00_Fool.jpg"},
  {name:"The Magician", desc:"Power & action", img:"https://upload.wikimedia.org/wikipedia/commons/d/de/RWS_Tarot_01_Magician.jpg"},
  {name:"High Priestess", desc:"Intuition", img:"https://upload.wikimedia.org/wikipedia/commons/8/88/RWS_Tarot_02_High_Priestess.jpg"}
];

function flipCard(card,index){
  if(chosen) return;
  chosen = true;

  let inner = card.querySelector(".card-inner");
  inner.classList.add("flipped");

  let r = Math.floor(Math.random()*tarot.length);

  document.getElementById("img"+index).src = tarot[r].img;

  let result = document.getElementById("result");
  result.innerText = tarot[r].name + " - " + tarot[r].desc;
  result.classList.add("show");
}
</script>

</body>
</html>
