<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <title>Tarot Reading</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

  <style>
    .nav-link{
      color:white !important;
      transition:0.3s;
    }

    .nav-link:hover{
      color:#c77dff !important;
      text-shadow:0 0 10px #c77dff;
    }

    .navbar{
      backdrop-filter:blur(10px);
    }
    body {
      background: radial-gradient(circle, #240046, #10002b);
      color:white;
      text-align:center;
    }

    .glow {
      text-shadow: 0 0 10px #c77dff;
    }

    .card-container {
      perspective:1000px;
      cursor:pointer;
    }

    .card-inner {
      width:150px;
      height:250px;
      transition: transform 0.8s;
      transform-style: preserve-3d;
      position:relative;
    }

    .flipped {
      transform: rotateY(180deg);
    }

    .card-front, .card-back {
      position:absolute;
      width:100%;
      height:100%;
      backface-visibility:hidden;
      border-radius:10px;
    }

    .card-front {
      background:black;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:20px;
    }

    .card-back {
      transform: rotateY(180deg);
    }

    img {
      width:100%;
      height:100%;
      border-radius:10px;
    }

    .result-box {
      margin-top:30px;
      padding:20px;
      border-radius:15px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      box-shadow:0 0 20px #9d4edd;
      opacity:0;
      transition:0.5s;
    }

    .show {
      opacity:1;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">

  <div class="container">

    <a class="navbar-brand glow" href="index.html">
      🔮 Tarot World
    </a>

    <!-- MOBILE BUTTON -->
    <button class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#menu">

      <span class="navbar-toggler-icon"></span>

    </button>

    <!-- MENU -->
    <div class="collapse navbar-collapse justify-content-end" id="menu">

      <ul class="navbar-nav">

        <li class="nav-item">
          <a class="nav-link" href="index.html">
            Home
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="features.html">
            Features
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="about.html">
            About Us
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="pricing.html">
            Pricing
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="card.html">
            Cards
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link active" href="profile.html">
            Reading
          </a>
        </li>

      </ul>

    </div>

  </div>

</nav>

<h1 class="glow">🔮 Past • Present • Future</h1>
<p>Click all cards to reveal your destiny</p>

<div class="d-flex justify-content-center gap-4 mt-4 flex-wrap">

  <!-- PAST -->
  <div class="card-container" onclick="flipCard(this,0)">
    <div class="card-inner">
      <div class="card-front">Past</div>
      <div class="card-back"><img id="img0"></div>
    </div>
  </div>

  <!-- PRESENT -->
  <div class="card-container" onclick="flipCard(this,1)">
    <div class="card-inner">
      <div class="card-front">Present</div>
      <div class="card-back"><img id="img1"></div>
    </div>
  </div>

  <!-- FUTURE -->
  <div class="card-container" onclick="flipCard(this,2)">
    <div class="card-inner">
      <div class="card-front">Future</div>
      <div class="card-back"><img id="img2"></div>
    </div>
  </div>

</div>

<div id="result" class="result-box"></div>

<script>
let flippedCount = 0;

const tarot = [
  {name:"The Fool", desc:"New beginning & adventure", img:"https://upload.wikimedia.org/wikipedia/commons/5/53/RWS_Tarot_00_Fool.jpg"},
  {name:"The Magician", desc:"Power & action", img:"https://upload.wikimedia.org/wikipedia/commons/d/de/RWS_Tarot_01_Magician.jpg"},
  {name:"High Priestess", desc:"Intuition & mystery", img:"https://upload.wikimedia.org/wikipedia/commons/8/88/RWS_Tarot_02_High_Priestess.jpg"},
  {name:"The Empress", desc:"Growth & nurturing", img:"https://upload.wikimedia.org/wikipedia/commons/d/d2/RWS_Tarot_03_Empress.jpg"}
];

let results = ["","",""];

function flipCard(card,index){
  let inner = card.querySelector(".card-inner");

  if(inner.classList.contains("flipped")) return;

  inner.classList.add("flipped");

  let r = Math.floor(Math.random()*tarot.length);

  document.getElementById("img"+index).src = tarot[r].img;

  results[index] = tarot[r].name + " → " + tarot[r].desc;

  flippedCount++;

  if(flippedCount === 3){
    showResult();
  }
}

function showResult(){
  let text = `
  <h4 class="glow">Your Reading ✨</h4>
  <p><b>Past:</b> ${results[0]}</p>
  <p><b>Present:</b> ${results[1]}</p>
  <p><b>Future:</b> ${results[2]}</p>
  `;

  let resultBox = document.getElementById("result");
  resultBox.innerHTML = text;
  resultBox.classList.add("show");
}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</script>

</body>
</html>
