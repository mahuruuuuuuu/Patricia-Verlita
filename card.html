<!DOCTYPE html>
<html>
<head>
  <title>Tarot Cards</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

  <style>
    body {
      background:#10002b;
      color:white;
    }

    .card {
      background:#240046;
      border:none;
      transition:0.4s;
    }

    .card:hover {
      transform:scale(1.1);
      box-shadow:0 0 25px #9d4edd;
    }

    img {
      height:300px;
      object-fit:cover;
    }
  </style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a href="index.html" class="navbar-brand">🔮 Tarot World</a>
  </div>
</nav>

<div class="container mt-4">
  <h2 class="text-center glow mb-4">✨ Tarot Gallery</h2>

  <div class="row">

    <div class="col-md-4">
      <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/RWS_Tarot_00_Fool.jpg">
        <div class="card-body text-center"><h5>The Fool</h5></div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/d/de/RWS_Tarot_01_Magician.jpg">
        <div class="card-body text-center"><h5>The Magician</h5></div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/88/RWS_Tarot_02_High_Priestess.jpg">
        <div class="card-body text-center"><h5>High Priestess</h5></div>
      </div>
    </div>

  </div>
</div>

</body>
</html>
