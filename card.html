<!DOCTYPE html>
<html>
<head>
  <title>Tarot Cards</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body {
      background: #1a1a2e;
      color: white;
    }
    .card {
      background-color: #2a2a4a;
      cursor: pointer;
      transition: 0.3s;
    }
    .card:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

<div class="container mt-4">
  <h2 class="text-center mb-4">🔮 Tarot Gallery</h2>

  <div class="row">

    <div class="col-md-4">
      <div class="card" onclick="showCard('The Fool', 'New beginnings, adventure')">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/RWS_Tarot_00_Fool.jpg" class="card-img-top">
        <div class="card-body">
          <h5>The Fool</h5>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card" onclick="showCard('The Magician', 'Skill, power, action')">
        <img src="https://upload.wikimedia.org/wikipedia/commons/d/de/RWS_Tarot_01_Magician.jpg" class="card-img-top">
        <div class="card-body">
          <h5>The Magician</h5>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card" onclick="showCard('High Priestess', 'Intuition, mystery')">
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/88/RWS_Tarot_02_High_Priestess.jpg" class="card-img-top">
        <div class="card-body">
          <h5>High Priestess</h5>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
function showCard(title, desc){
  alert(title + ":\n" + desc);
}
</script>

</body>
</html>
