<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  
  <title>Tarot Cards</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

  <style>
    body {
      background: radial-gradient(circle, #240046, #10002b);
      color:white;
    }

    .glow {
      text-shadow: 0 0 10px #c77dff;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      overflow:hidden;
      transition:0.4s;
      cursor:pointer;
    }

    .card:hover {
      transform:scale(1.08);
      box-shadow:0 0 25px #c77dff;
    }

    img {
      height:300px;
      object-fit:cover;
    }

    /* MODAL STYLE */
    .modal-content {
      background:#1a0033;
      color:white;
      border-radius:15px;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a href="index.html" class="navbar-brand glow">🔮 Tarot World</a>
  </div>
</nav>

<div class="container mt-4">
  <h2 class="text-center glow mb-4">✨ Tarot Gallery</h2>

  <div class="row g-4">

    <!-- CARD 1 -->
    <div class="col-md-4">
      <div class="card" onclick="openModal('The Fool','New beginning & adventure','https://upload.wikimedia.org/wikipedia/en/d/d4/RWS_Tarot_00_Fool.jpg')">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQDkiA21aSSZKy7hNJX1MdpDahGjKaGLxVcdQ&s">
        <div class="card-body text-center"><h5>The Fool</h5></div>
      </div>
    </div>

    <!-- CARD 2 -->
    <div class="col-md-4">
      <div class="card" onclick="openModal('The Magician','Power & action','https://upload.wikimedia.org/wikipedia/en/d/de/RWS_Tarot_01_Magician.jpg')">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRg8doieXR6JVstpcT9IR8HO0sbFdRqxaJnoQ&s">
        <div class="card-body text-center"><h5>The Magician</h5></div>
      </div>
    </div>

    <!-- CARD 3 -->
    <div class="col-md-4">
      <div class="card" onclick="openModal('High Priestess','Intuition & mystery','https://upload.wikimedia.org/wikipedia/en/8/88/RWS_Tarot_02_High_Priestess.jpg')">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS3CwQaMKsTzMTEsNkJu8auKp5mnSyhTav8Tw&s">
        <div class="card-body text-center"><h5>High Priestess</h5></div>
      </div>
    </div>

    <!-- CARD 4 -->
    <div class="col-md-4">
      <div class="card" onclick="openModal('The Emperor','Authority & structure','https://upload.wikimedia.org/wikipedia/en/c/c3/RWS_Tarot_04_Emperor.jpg')">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRUggtsclXxI_oYtdjuAA0WA-8dGQoMgL-PXQ&s">
        <div class="card-body text-center"><h5>The Emperor</h5></div>
      </div>
    </div>

    <!-- CARD 5 -->
    <div class="col-md-4">
      <div class="card" onclick="openModal('The Lovers','Love & harmony','https://upload.wikimedia.org/wikipedia/en/3/3a/TheLovers.jpg')">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/db/RWS_Tarot_06_Lovers.jpg/250px-RWS_Tarot_06_Lovers.jpg">
        <div class="card-body text-center"><h5>The Lovers</h5></div>
      </div>
    </div>

    <!-- CARD 6 -->
    <div class="col-md-4">
      <div class="card" onclick="openModal('The Sun','Success & positivity','https://upload.wikimedia.org/wikipedia/en/1/17/RWS_Tarot_19_Sun.jpg')">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/17/RWS_Tarot_19_Sun.jpg/960px-RWS_Tarot_19_Sun.jpg">
        <div class="card-body text-center"><h5>The Sun</h5></div>
      </div>
    </div>

  </div>
</div>

<!-- MODAL -->
<div class="modal fade" id="cardModal">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content text-center p-3">

      <h3 id="modalTitle"></h3>
      <img id="modalImg" class="my-3" style="width:200px;">
      <p id="modalDesc"></p>

      <button class="btn btn-light" data-bs-dismiss="modal">Close</button>

    </div>
  </div>
</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
function openModal(name, desc, img){
  document.getElementById("modalTitle").innerText = name;
  document.getElementById("modalDesc").innerText = desc;
  document.getElementById("modalImg").src = img;

  let modal = new bootstrap.Modal(document.getElementById('cardModal'));
  modal.show();
}
</script>

</body>
</html>
